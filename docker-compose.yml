version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: realtalk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realtalk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realtalk_pass}
      POSTGRES_DB: ${POSTGRES_DB:-realtalk_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realtalk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realtalk_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-realtalk}:${POSTGRES_PASSWORD:-realtalk_pass}@db:5432/${POSTGRES_DB:-realtalk_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: realtalk_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  nginx:
    image: nginx:alpine
    container_name: realtalk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
